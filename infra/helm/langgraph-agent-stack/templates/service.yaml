apiVersion: v1
kind: Service
metadata:
  name: {{ include "langgraph-agent-stack.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "langgraph-agent-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: {{ include "langgraph-agent-stack.name" . }}
spec:
  type: {{ .Values.service.type }}

  selector:
    {{- include "langgraph-agent-stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api

  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http
