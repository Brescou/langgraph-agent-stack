{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "langgraph-agent-stack.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "langgraph-agent-stack.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className }}
spec:
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ include "langgraph-agent-stack.fullname" . }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "langgraph-agent-stack.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
