# secret.yaml — Sensitive application credentials
#
# IMPORTANT: This file contains PLACEHOLDER base64-encoded values.
# Replace every value before applying to a real cluster.
#
# How to encode a real value:
#   echo -n "your-actual-value" | base64
#
# Recommended production approach: do NOT commit real secrets to source control.
# Instead, use one of:
#   - External Secrets Operator (https://external-secrets.io) with AWS Secrets Manager,
#     GCP Secret Manager, HashiCorp Vault, etc.
#   - Sealed Secrets (https://sealed-secrets.netlify.app)
#   - SOPS + age/GPG encrypted secret files
#
# Helm-ready: replace data values with {{ .Values.secrets.* | b64enc }} for templating,
# or reference an existing secret via existingSecret.

apiVersion: v1
kind: Secret
metadata:
  name: langgraph-agent-stack-secrets
  namespace: langgraph-agents
  labels:
    app.kubernetes.io/name: langgraph-agent-stack
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: langgraph-agent-stack
    app.kubernetes.io/managed-by: kubectl
  annotations:
    # Remind operators that this manifest must never hold real credentials in VCS
    note: "Replace placeholder values with real base64-encoded secrets or use external secrets operator"
type: Opaque
data:
  # Replace with: echo -n "sk-ant-api03-..." | base64
  # Placeholder decodes to: "replace-with-real-anthropic-api-key"
  ANTHROPIC_API_KEY: cmVwbGFjZS13aXRoLXJlYWwtYW50aHJvcGljLWFwaS1rZXk=

  # Replace with: echo -n "redis://langgraph-redis:6379/0" | base64
  # Placeholder decodes to: "replace-with-real-redis-url"
  # This key is optional — the app starts fine without it when MEMORY_BACKEND=sqlite
  REDIS_URL: cmVwbGFjZS13aXRoLXJlYWwtcmVkaXMtdXJs
