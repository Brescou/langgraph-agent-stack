# configmap.yaml — Non-sensitive application configuration
#
# All variables stored here are safe to commit to source control.
# Sensitive values (API keys, connection strings) belong in secret.yaml.
#
# Helm-ready: replace hardcoded values with {{ .Values.config.* }} for templating.

apiVersion: v1
kind: ConfigMap
metadata:
  name: langgraph-agent-stack-config
  namespace: langgraph-agents
  labels:
    app.kubernetes.io/name: langgraph-agent-stack
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: langgraph-agent-stack
    app.kubernetes.io/managed-by: kubectl
data:
  # LLM model identifier passed to langchain-anthropic
  MODEL_NAME: "claude-3-5-sonnet-20241022"

  # Logging verbosity — one of: DEBUG, INFO, WARNING, ERROR, CRITICAL
  LOG_LEVEL: "INFO"

  # Port the uvicorn process listens on inside the container
  API_PORT: "8000"

  # Memory backend — sqlite (default, no extra infra) or redis (requires Redis service)
  MEMORY_BACKEND: "sqlite"

  # Deployment environment tag surfaced in /health and structured logs
  ENVIRONMENT: "production"

  # SQLite file path inside the container (mapped to a volume in deployment.yaml)
  SQLITE_PATH: "/app/data/memory.db"

  # Maximum tokens the LLM is allowed to generate per call
  MAX_TOKENS: "4096"
