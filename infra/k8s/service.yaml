# service.yaml — Kubernetes Service for langgraph-agent-stack
#
# Exposes the FastAPI application inside the cluster on port 80.
# An Ingress or Gateway API resource should front this service for external traffic.
#
# Helm-ready: replace hardcoded values with {{ .Values.service.* }} for templating.

apiVersion: v1
kind: Service
metadata:
  name: langgraph-agent-stack
  namespace: langgraph-agents
  labels:
    app.kubernetes.io/name: langgraph-agent-stack
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: langgraph-agent-stack
    app.kubernetes.io/managed-by: kubectl
spec:
  # ClusterIP keeps the service internal; use an Ingress to expose externally.
  # {{ .Values.service.type }}
  type: ClusterIP

  selector:
    app.kubernetes.io/name: langgraph-agent-stack
    app.kubernetes.io/component: api

  ports:
    - name: http
      protocol: TCP
      # External port exposed to other cluster workloads
      port: 80
      # Port the container listens on (must match containerPort in deployment)
      targetPort: http
